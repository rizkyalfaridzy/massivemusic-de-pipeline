name: massivemusic-de

# ---------------------------------------------------------------------------
# Two ways to run:
#   (A) One-shot pipeline (default, lightweight, guaranteed):
#         docker compose run --rm pipeline run-all
#   (B) Full orchestration with Airflow UI (optional):
#         docker compose --profile airflow up -d
# ---------------------------------------------------------------------------

x-warehouse-env: &warehouse-env
  WAREHOUSE_HOST: postgres
  WAREHOUSE_PORT: 5432
  WAREHOUSE_DB: warehouse
  WAREHOUSE_USER: warehouse
  WAREHOUSE_PASSWORD: warehouse
  SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
  SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
  ISRC_SOURCE: ${ISRC_SOURCE:-auto}
  MAX_SONGS: ${MAX_SONGS:-25}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5433:5432"        # host:container — 5433 avoids clashing with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- (A) The data pipeline: extraction + dbt build ----------------------
  pipeline:
    build: .
    image: massivemusic/pipeline:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *warehouse-env
    volumes:
      - ./data:/app/data            # so you can swap in your real catalog CSV
      - ./dbt:/app/dbt              # live-edit dbt models without rebuilding

  # ---- (B) Optional Airflow orchestration ---------------------------------
  airflow:
    image: apache/airflow:2.9.3-python3.11
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://warehouse:warehouse@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-docker==3.12.0"
      <<: *warehouse-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./docker/airflow/init.sh:/opt/airflow/init.sh
      - /var/run/docker.sock:/var/run/docker.sock   # DockerOperator runs the pipeline image
    ports:
      - "8080:8080"
    command: ["bash", "/opt/airflow/init.sh"]

volumes:
  pgdata:
